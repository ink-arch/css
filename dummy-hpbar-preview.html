<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>허수아비 체력바 시인성 개선 프리뷰</title>
<style>
:root{ --bg:#101314; --panel:#191e20; --panel2:#20272a; --line:#2c3438; --ink:#e8ebe6; --ink2:#9aa5a0; --accent:#f2b43c; }
@media (prefers-color-scheme: light){ :root{ --bg:#f2f3ef; --panel:#ffffff; --panel2:#e9ece7; --line:#d4d9d2; --ink:#20261f; --ink2:#5d685f; } }
:root[data-theme="dark"]{ --bg:#101314; --panel:#191e20; --panel2:#20272a; --line:#2c3438; --ink:#e8ebe6; --ink2:#9aa5a0; }
:root[data-theme="light"]{ --bg:#f2f3ef; --panel:#ffffff; --panel2:#e9ece7; --line:#d4d9d2; --ink:#20261f; --ink2:#5d685f; }
*{box-sizing:border-box}
body{background:var(--bg); color:var(--ink); font-family:-apple-system,"Apple SD Gothic Neo","Pretendard",system-ui,sans-serif; margin:0; padding:26px 18px 60px; line-height:1.55}
.wrap{max-width:960px; margin:0 auto}
h1{font-size:1.25rem; margin:0 0 4px; letter-spacing:-.01em}
.sub{color:var(--ink2); font-size:.83rem; margin:0 0 18px}
h2{font-size:.76rem; text-transform:uppercase; letter-spacing:.08em; color:var(--ink2); margin:22px 0 10px; font-weight:600}
.layout{display:flex; gap:18px; align-items:flex-start; flex-wrap:wrap}
.stagecol{flex:0 1 600px; min-width:320px}
.sidecol{flex:1 1 300px; min-width:280px}

.stage{position:relative; width:min(100%,405px); aspect-ratio:1/2; border-radius:12px; overflow:hidden; background:#222; margin:0 auto}
img.plate{position:absolute; inset:0; width:100%; height:100%; display:block}
.viewport{position:absolute; inset:0; transform-origin:0 0}
.overlay{position:absolute; inset:0}
.ovbg{position:absolute; display:block}
.fillbox{position:absolute}
.clip{position:absolute; top:0; bottom:0; left:0; overflow:hidden}
.msk{position:absolute; top:0; bottom:0; left:0}
.sweep{position:absolute; top:0; bottom:0; width:16%; border-radius:6px; background:linear-gradient(90deg,transparent,#f2b43c 30%,#ffd98a 50%,#f2b43c 70%,transparent); opacity:0; transform:translateX(-50%); pointer-events:none}
.ticks{position:absolute; pointer-events:none}
.tick{position:absolute; top:0; bottom:0; background:#08090b; transform:translateX(-50%)}
.viewtabs{display:flex; gap:8px; justify-content:center; margin-bottom:10px}
.vtab{width:110px; background:var(--panel2); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:8px 0; cursor:pointer; font-size:.84rem; font-family:inherit}
.vtab.on{background:var(--accent); color:#20180a; border-color:transparent; font-weight:600}
.vtab:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
.hud{position:absolute; top:8px; right:8px; display:flex; gap:5px; z-index:5}
.hudbtn{background:rgba(0,0,0,.45); border:1px solid rgba(255,255,255,.2); color:#fff; border-radius:7px; padding:3px 10px; cursor:pointer; font-size:.73rem; font-family:inherit}
.hudbtn.on{background:var(--accent); color:#20180a; border-color:transparent; font-weight:600}
.hudbtn:focus-visible,.act:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
.capnote{position:absolute; left:8px; top:8px; z-index:5; font-size:.68rem; color:#fff; background:rgba(0,0,0,.4); padding:2px 8px; border-radius:99px}

.acts{display:flex; gap:14px; flex-wrap:wrap; margin-top:12px; align-items:center}
.grp{display:flex; align-items:center; gap:6px; background:var(--panel); border:1px solid var(--line); border-radius:9px; padding:5px 8px}
.grp span{font-size:.78rem; color:var(--ink2)}
.act{background:var(--panel2); border:1px solid var(--line); color:var(--ink); border-radius:7px; padding:7px 13px; cursor:pointer; font-size:.84rem; font-family:inherit}
.act.primary{background:var(--accent); color:#20180a; border-color:transparent; font-weight:600}
input[type=number]{width:72px; background:var(--panel2); border:1px solid var(--line); color:var(--ink); border-radius:7px; padding:6px 8px; font-size:.84rem; font-family:inherit; font-variant-numeric:tabular-nums}
input[type=number]:focus-visible{outline:2px solid var(--accent); outline-offset:1px}
.seghint{font-size:.74rem; color:var(--ink2); font-weight:600}
.spin{display:flex; flex-direction:column; gap:2px}
.spin button{background:var(--accent); border:none; border-radius:4px; font-size:.5rem; line-height:1; padding:3px 6px; cursor:pointer; color:#20180a}
.spin button:focus-visible{outline:2px solid var(--accent); outline-offset:1px}
input[type=number]{-moz-appearance:textfield; appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none; margin:0}

.controls{display:grid; grid-template-columns:1fr; gap:13px; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:15px 17px}
.ctl label{display:flex; justify-content:space-between; font-size:.78rem; color:var(--ink2); margin-bottom:4px}
.ctl label b{color:var(--ink); font-weight:600; font-variant-numeric:tabular-nums}
input[type=range]{width:100%; accent-color:var(--accent)}
.note{font-size:.76rem; color:var(--ink2); margin-top:14px}
.note code{background:var(--panel2); padding:1px 5px; border-radius:4px; font-size:.7rem}
@media (prefers-reduced-motion: reduce){ *{transition:none!important; animation:none!important} }
</style>
</head>
<body>

<div class="wrap">
<h1>허수아비 체력바 — 시인성 개선 프리뷰</h1>
<p class="sub">칸 = HP 100당</p>

<div class="layout">
<div class="stagecol" style="flex:1 1 auto; max-width:640px; margin:0 auto">
  <div class="viewtabs">
    <button class="vtab" data-view="full">풀프레임</button>
    <button class="vtab on" data-view="crop">확대</button>
  </div>
  <div class="stage" id="stage">
    <div class="viewport" id="viewport">
      <img class="plate" id="plate" alt="인게임 플레이트">
      <div class="overlay" id="overlay"></div>
    </div>
  </div>

  <div class="acts">
    <div class="grp"><span>체력 <b class="seghint" id="seghint"></b></span><input type="number" id="c-maxhp" min="50" max="2000" step="25"><div class="spin"><button id="hp-up" aria-label="체력 증가">▲</button><button id="hp-dn" aria-label="체력 감소">▼</button></div></div>
    <div class="grp"><span>대미지</span><input type="number" id="c-dmg" min="1" max="500" step="5"><button class="act primary" id="hit">공격</button></div>
    <div class="grp"><span>연속 공격</span><input type="number" id="c-burst" min="2" max="20" step="1"><button class="act primary" id="burst">연속 공격</button></div>
  </div>
  <div class="acts">
    <button class="act primary" id="upg">업그레이드 연출</button>
    <button class="act primary" id="reset">리셋</button>
  </div>
  <p class="note"></p>
</div>

</div>
</div>

/* 실측 좌표 (배경 600×70 렉트) — 뷰 2종 */
const VIEWS={
  full:{img:PLATE_FULL, cw:1080, bx0:458.2, by0:800.25, bx1:633.5, by1:827.5, stageW:'405px', aspect:'1 / 2'},
  crop:{img:PLATE_CROP, cw:1200, bx0:436.4, by0:520.5, bx1:787.0, by1:575.0, stageW:'600px', aspect:'1 / 1'},
};
let curView='crop';
const BAR_W=600, BAR_H=70, TICK_W=22, TICK_INSET=8, FILL_INSET_X=10, FILL_INSET_Y=8;
const HP_PER_SEGMENT=100, PAD=30;
const OCOLOR='#06080a', GHOST_COLOR='#ffffff';

const P={ alpha:70, tint:20, outline:6, height:100, maxhp:300, dmg:60, burst:5, tickW:12 };
const SPEED=5;
function segCount(){ return Math.max(1, Math.round(P.maxhp/HP_PER_SEGMENT)); }

let hp=P.maxhp, ghostRatio=1, flash=null, sweepT=-1;
const zoom=1;

const stage=document.getElementById('stage');
const viewport=document.getElementById('viewport');
const plateImg=document.getElementById('plate');
function applyView(){
  const v=VIEWS[curView];
  plateImg.src=v.img;
  stage.style.width='min(100%,'+v.stageW+')';
  stage.style.aspectRatio=v.aspect;
  document.querySelectorAll('.vtab[data-view]').forEach(b=>b.classList.toggle('on',b.dataset.view===curView));
  renderBg();
}

const overlay=document.getElementById('overlay');
const ovbg=document.createElement('img'); ovbg.className='ovbg'; overlay.appendChild(ovbg);
const fillbox=document.createElement('div'); fillbox.className='fillbox'; overlay.appendChild(fillbox);
const ghostClip=document.createElement('div'); ghostClip.className='clip'; fillbox.appendChild(ghostClip);
const ghostMsk=document.createElement('div'); ghostMsk.className='msk'; ghostClip.appendChild(ghostMsk);
const frontClip=document.createElement('div'); frontClip.className='clip'; fillbox.appendChild(frontClip);
const frontMsk=document.createElement('div'); frontMsk.className='msk'; frontClip.appendChild(frontMsk);
const sweepEl=document.createElement('div'); sweepEl.className='sweep'; fillbox.appendChild(sweepEl);
const ticksEl=document.createElement('div'); ticksEl.className='ticks'; overlay.appendChild(ticksEl);

for(const m of [ghostMsk,frontMsk]){
  m.style.webkitMaskImage=`url(${SPR_FILL})`; m.style.maskImage=`url(${SPR_FILL})`;
  m.style.webkitMaskSize='100% 100%'; m.style.maskSize='100% 100%';
}
ghostMsk.style.background=GHOST_COLOR;

/* ── 배경 스프라이트: 곱연산 틴트 + 검정 아웃라인 ── */
const barSprite=new Image(); let spriteReady=false;
barSprite.onload=()=>{ spriteReady=true; renderBg(); };
barSprite.src=SPR_BAR;

function renderBg(){
  if(!spriteReady){ layout(); return; }
  const sw=barSprite.width, sh=barSprite.height;
  const cv=document.createElement('canvas'); cv.width=sw+PAD*2; cv.height=sh+PAD*2;
  const ctx=cv.getContext('2d');

  const t=document.createElement('canvas'); t.width=sw; t.height=sh;
  const tc=t.getContext('2d');
  tc.drawImage(barSprite,0,0);
  const id=tc.getImageData(0,0,sw,sh);
  const g=Math.round(P.tint/100*255);
  for(let i=0;i<id.data.length;i+=4){
    id.data[i]=id.data[i]*g/255; id.data[i+1]=id.data[i+1]*g/255; id.data[i+2]=id.data[i+2]*g/255;
  }
  tc.putImageData(id,0,0);

  if(P.outline>0){
    const v=VIEWS[curView];
    const o=P.outline*(sw/BAR_W);
    const oy=o*(sh/sw)*((v.bx1-v.bx0)/(v.by1-v.by0))/(P.height/100); // 스크린 균일 보정
    const sil=document.createElement('canvas'); sil.width=sw; sil.height=sh;
    const sc=sil.getContext('2d');
    sc.drawImage(barSprite,0,0);
    sc.globalCompositeOperation='source-in';
    sc.fillStyle=OCOLOR; sc.fillRect(0,0,sw,sh);
    for(let k=0;k<16;k++){
      const ang=k/16*Math.PI*2;
      ctx.drawImage(sil, PAD+Math.cos(ang)*o, PAD+Math.sin(ang)*oy);
    }
  }
  ctx.drawImage(t,PAD,PAD);
  ovbg.src=cv.toDataURL();
  ovbg.style.opacity=P.alpha/100;
  layout();
}

/* ── 배치 ── */
function layout(){
  const v=VIEWS[curView];
  const S=stage.clientWidth, k=S/v.cw;
  const bw=(v.bx1-v.bx0)*k, bh=(v.by1-v.by0)*k, bx=v.bx0*k, by=v.by0*k;
  const sy=P.height/100;
  const cy=by+bh/2;
  const bhS=bh*sy;

  const sw=barSprite.width||632, sh=barSprite.height||118;
  const padX=PAD/sw*bw, padY=PAD/sh*bhS;
  ovbg.style.left=(bx-padX)+'px'; ovbg.style.top=(cy-bhS/2-padY)+'px';
  ovbg.style.width=(bw+padX*2)+'px'; ovbg.style.height=(bhS+padY*2)+'px';

  const fh=bhS*((BAR_H-FILL_INSET_Y)/BAR_H);
  const fw=bw*((BAR_W-FILL_INSET_X)/BAR_W);
  fillbox.style.left=(bx+bw*(FILL_INSET_X/2/BAR_W))+'px';
  fillbox.style.top=(cy-fh/2)+'px';
  fillbox.style.width=fw+'px'; fillbox.style.height=fh+'px';
  ghostMsk.style.width=fw+'px'; frontMsk.style.width=fw+'px';

  const th=bhS*((BAR_H-TICK_INSET)/BAR_H);
  ticksEl.style.left=bx+'px'; ticksEl.style.top=(cy-th/2)+'px';
  ticksEl.style.width=bw+'px'; ticksEl.style.height=th+'px';
  ticksEl.innerHTML='';
  const seg=segCount();
  for(let i=1;i<seg;i++){
    const tk=document.createElement('div'); tk.className='tick';
    tk.style.left=(i/seg*100)+'%';
    tk.style.width=(bw*P.tickW/BAR_W)+'px';
    tk.style.borderRadius=(bw*P.tickW/BAR_W*0.25)+'px';
    ticksEl.appendChild(tk);
  }
  syncUI();
}


/* ── 상태 루프 ── */
function fillColor(r){ return r>0.6?'#35c53a':(r>0.3?'#ffb01e':'#f63328'); }
function mix(a,b,t){
  const pa=[1,3,5].map(i=>parseInt(a.slice(i,i+2),16));
  const pb=[1,3,5].map(i=>parseInt(b.slice(i,i+2),16));
  return '#'+pa.map((v,i)=>Math.round(v+(pb[i]-v)*t).toString(16).padStart(2,'0')).join('');
}
let last=performance.now();
function loop(now){
  const dt=Math.min((now-last)/1000,.1); last=now;
  const target=hp/P.maxhp;
  ghostRatio+=(target-ghostRatio)*Math.min(dt*SPEED,1);
  if(Math.abs(ghostRatio-target)<0.004) ghostRatio=target;

  let fc=fillColor(target);
  if(flash){ const t=(now-flash.t0)/flash.dur; if(t>=1) flash=null; else fc=mix(flash.color,fc,t); }
  frontClip.style.width=(target*100)+'%';
  frontMsk.style.background=fc;

  const ghostExcess=ghostRatio-target;
  ghostClip.style.visibility=ghostExcess>0.004?'visible':'hidden';
  ghostClip.style.width=(Math.max(ghostRatio,target)*100)+'%';

  if(sweepT>=0){
    const t=Math.min((now-sweepT)/400,1);
    const e=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    const half=8;
    sweepEl.style.left=(half+e*(100-2*half))+'%';
    sweepEl.style.opacity=t<.6?0.85:0.85*(1-(t-.6)/.4);
    if(t>=1){ sweepEl.style.opacity=0; sweepT=-1; }
  } else sweepEl.style.opacity=0;
  requestAnimationFrame(loop);
}

/* ── 인터랙션 ── */
document.getElementById('hit').onclick=()=>{ hp=Math.max(0,hp-P.dmg); if(hp===0) setTimeout(()=>{hp=P.maxhp;ghostRatio=1;},900); };
document.getElementById('burst').onclick=async()=>{ for(let i=0;i<P.burst;i++){ document.getElementById('hit').onclick(); await new Promise(r=>setTimeout(r,220)); } };
document.getElementById('upg').onclick=()=>{ hp=P.maxhp; ghostRatio=1; flash={color:'#f2b43c',t0:performance.now(),dur:500}; sweepT=performance.now();
  ticksEl.querySelectorAll('.tick').forEach((t,i)=>{ t.animate([{transform:'translateX(-50%) scaleY(0)'},{transform:'translateX(-50%) scaleY(1)'}],{duration:350,delay:i*40,easing:'ease-out'}); });
};
document.getElementById('reset').onclick=()=>{ hp=P.maxhp; ghostRatio=1; flash=null; };



function bindNum(id,key,after){
  const el=document.getElementById('c-'+id);
  el.onchange=()=>{ const v=Math.min(+el.max,Math.max(+el.min,+el.value||+el.min)); P[key]=v; el.value=v; if(after) after(); layout(); };
}
bindNum('maxhp','maxhp',()=>{ hp=P.maxhp; ghostRatio=1; });
bindNum('dmg','dmg'); bindNum('burst','burst');
function nudgeHp(d){ P.maxhp=Math.min(2000,Math.max(50,P.maxhp+d)); hp=P.maxhp; ghostRatio=1; layout(); }
document.getElementById('hp-up').onclick=()=>nudgeHp(25);
document.getElementById('hp-dn').onclick=()=>nudgeHp(-25);

function syncUI(){
  document.getElementById('c-maxhp').value=P.maxhp;
  document.getElementById('c-dmg').value=P.dmg;
  document.getElementById('c-burst').value=P.burst;
  document.getElementById('seghint').textContent=segCount()+'칸';
}

document.querySelectorAll('.vtab[data-view]').forEach(b=>b.onclick=()=>{ curView=b.dataset.view; applyView(); });
window.addEventListener('resize',()=>{ renderBg(); });
applyView();
requestAnimationFrame(loop);
</script>
